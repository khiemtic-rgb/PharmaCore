# KitPlatform — Nginx sites for Novixa
# Install: sudo cp deploy/ubuntu/nginx-kit-platform.conf /etc/nginx/sites-available/kit-platform
#          sudo ln -sf /etc/nginx/sites-available/kit-platform /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
#
# SSL: sudo certbot --nginx -d api.novixa.vn -d admin.novixa.vn -d app.novixa.vn -d pos.novixa.vn -d survey.novixa.vn -d prescriber.novixa.vn -d partner.novixa.vn

# --- API (reverse proxy → Kestrel :5000) ---
server {
    listen 80;
    listen [::]:80;
    server_name api.novixa.vn;

    client_max_body_size 32m;

    location ~ ^/api/public/assessment/submissions/[0-9a-f-]+/report\.pdf$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# --- Admin SPA ---
server {
    listen 80;
    listen [::]:80;
    server_name admin.novixa.vn;

    root /var/www/kit-platform/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

