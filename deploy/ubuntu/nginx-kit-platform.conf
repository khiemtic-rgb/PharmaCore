# --- Staff POS mobile PWA ---
server {
    listen 80;
    listen [::]:80;
    server_name pos.novixa.vn;

    root /var/www/kit-platform/staff-app;
    index index.html;

    include /etc/nginx/snippets/staff-pwa-cache.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff2?|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# --- KAP public assessment SPA (survey.novixa.vn) ---
server {
    listen 80;
    listen [::]:80;
    server_name survey.novixa.vn;

    root /var/www/kit-platform/assessment-web;
    index index.html;

    client_max_body_size 8m;

    location ~ ^/api/public/assessment/submissions/[0-9a-f-]+/report\.pdf$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host api.novixa.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host api.novixa.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# --- Prescriber portal SPA (Rx-2) ---
