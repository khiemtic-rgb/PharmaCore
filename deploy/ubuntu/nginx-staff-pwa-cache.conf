# Include inside each staff POS server block (HTTP + HTTPS):
#   include /etc/nginx/snippets/staff-pwa-cache.conf;

location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

location = /version.json {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
