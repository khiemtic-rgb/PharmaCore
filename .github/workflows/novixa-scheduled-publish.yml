# Mỗi ngày build lại site để bài có pubDate = hôm nay được hiển thị.
# Tuỳ chọn: thêm secret CF_DEPLOY_HOOK (Cloudflare Pages → Deploy hooks) để deploy không cần commit.
name: Novixa scheduled publish

on:
  schedule:
    # 00:05 giờ Việt Nam (UTC+7) ≈ 17:05 UTC ngày hôm trước
    - cron: '5 17 * * *'
  workflow_dispatch:
    inputs:
      article_id:
        description: 'Thử 1 bài (vd. nv-loyalty) — maps ARTICLE_ID'
        required: false
        type: string
      force_publish:
        description: 'Đăng ngay hôm nay (FORCE_PUBLISH)'
        required: false
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: novixa-site/package-lock.json

      - name: Auto-publish tin tức (ChatGPT + OpenAI ảnh)
        working-directory: novixa-site
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL }}
          PUBLISH_DATE: ${{ vars.PUBLISH_DATE }}
          ARTICLE_ID: ${{ github.event.inputs.article_id || vars.ARTICLE_ID }}
          FORCE_PUBLISH: ${{ github.event.inputs.force_publish == 'true' && '1' || '' }}
        run: |
          npm ci
          npm run publish:news

      - name: Import tin từ Excel (nếu có)
        working-directory: novixa-site
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -f import/tin-tuc.xlsx ] || [ -f import/tin-tuc.csv ]; then
            npm run import:news
          else
            echo "Không có Excel import — bỏ qua."
          fi

      - name: Regenerate ảnh thiếu (OpenAI → CF → SVG)
        working-directory: novixa-site
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run generate:news-images

      - name: Commit bài import (nếu đổi)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(novixa): import/scheduled news publish'
          file_pattern: |
            novixa-site/src/content/tin-tuc/*.md
            novixa-site/public/images/tin-tuc/*.png
            novixa-site/import/news-images-manifest.json
            novixa-site/import/fanpage-posted.json

      - name: Đăng fanpage (bài pubDate hôm nay, giờ VN)
        working-directory: novixa-site
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: npm run post:fanpage

      - name: Cập nhật thống kê truy cập
        working-directory: novixa-site
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run fetch:stats-snapshot

      - name: Commit log fanpage và stats (nếu đổi)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(novixa): fanpage post log / stats'
          file_pattern: |
            novixa-site/import/fanpage-posted.json
            novixa-site/public/stats-snapshot.json

      - name: Trigger Cloudflare Pages deploy
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          if [ -n "$CF_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$CF_DEPLOY_HOOK"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore(novixa): scheduled daily rebuild"
            git push
          fi
