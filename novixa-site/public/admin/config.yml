# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
# Novixa CMS — nhân viên đăng tin tại https://novixa.vn/admin/

locale: vi

backend:
  name: github
  repo: khiemtic-rgb/KitPlatform
  branch: main
  # OAuth qua Cloudflare Pages Functions (/auth, /callback).
  # Chưa cấu hình GITHUB_CLIENT_ID? Dùng "Sign in with token".
  base_url: https://novixa.vn
  auth_methods: [oauth, token]
  commit_messages:
    create: 'cms: thêm {{collection}} "{{slug}}"'
    update: 'cms: cập nhật {{collection}} "{{slug}}"'
    delete: 'cms: xóa {{collection}} "{{slug}}"'
    uploadMedia: 'cms: tải ảnh "{{path}}"'
    deleteMedia: 'cms: xóa ảnh "{{path}}"'

# Ảnh bài tin → public/images/tin-tuc/{slug}.png (đặt tên file = slug)
media_folder: novixa-site/public/images/tin-tuc
public_folder: /images/tin-tuc

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'

collections:
  - name: tin_tuc
    label: Tin tức
    label_singular: Bài viết
    description: >
      Đăng / sửa bài trên novixa.vn. Sau khi Lưu, chờ Cloudflare build vài phút.
      Ảnh đại diện: vào Media Library, tải PNG tên trùng slug (vd. ten-bai-viet.png), khuyến nghị 1200×630.
    folder: novixa-site/src/content/tin-tuc
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: '{{slug}}'
    identifier_field: title
    summary: '{{title}} — {{pubDate}}'
    sortable_fields:
      fields: [pubDate, title]
      default:
        field: pubDate
        direction: descending
    fields:
      - label: Tiêu đề
        name: title
        widget: string
        hint: Hiện trên trang tin và Google.
      - label: Mô tả ngắn
        name: description
        widget: text
        hint: 1–2 câu tóm tắt (meta description / danh sách tin).
      - label: Ngày đăng
        name: pubDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        hint: Bài có ngày sau hôm nay sẽ ẩn đến đúng ngày (giờ VN).
      - label: Ngôn ngữ
        name: lang
        widget: select
        options:
          - { label: Tiếng Việt, value: vi }
        default: vi
      - label: Nội dung
        name: body
        widget: markdown
        hint: Dùng heading ##, danh sách *, in đậm **text**.
